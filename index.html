<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 北陸行程</title>
    <link rel="icon" href="./images/emperor.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="main-container">
      <div id="sidebar">
        <div class="header">
          <h1>🏔️ 北陸行程</h1>
          <div class="flight-trigger">
            <p>
              2026.05.07 - 05.14 
              <span class="info-icon"><i class="fas fa-plane"></i> 航班資訊</span>
            </p>
            
            <div class="flight-popup">
              <div class="flight-item">
                <strong>✈️ 去程：IT252</strong>
                <p>5/7 (四) 台北 (TPE) 12:10 ➔ 小松 (KMQ) 16:05</p>
              </div>
              <hr>
              <div class="flight-item">
                <strong>✈️ 回程：IT253</strong>
                <p>5/14 (四) 小松 (KMQ) 16:55 ➔ 台北 (TPE) 19:10</p>
              </div>
            </div>
          </div>
        </div>
        <div id="itinerary-list" class="itinerary"></div>
      </div>

      <div id="map-container">
        <iframe
          id="gmap"
          src="https://maps.google.com/maps?q=富山&hl=zh-TW&z=10&output=embed"
        ></iframe>
      </div>
      <button id="goToTop" title="回到頂部">
        <i class="fas fa-chevron-up"></i>
      </button>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
